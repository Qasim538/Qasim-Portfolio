    <script>
      var canvas,
        stage,
        exportRoot,
        anim_container,
        dom_overlay_container,
        fnStartAnimation;
      function init() {
        canvas = document.getElementById("canvas");
        anim_container = document.getElementById("animation_container");
        dom_overlay_container = document.getElementById(
          "dom_overlay_container"
        );
        window.setTimeout(startDeferredLoad, 300);
      }
      function startDeferredLoad() {
        var comp = AdobeAn.getComposition("ED285684687548E5B434459B3C1CF945");
        var loader = new createjs.LoadQueue(false);
        loader.addEventListener("fileload", function (evt) {
          handleFileLoad(evt, comp);
        });
        loader.addEventListener("complete", function (evt) {
          handleComplete(evt, comp);
        });
        loader.loadManifest([
          { src: "images/LinkedFile_6.png", id: "LinkedFile_6" },
          { src: "images/WitchWaysPHONEpsb_0.png", id: "WitchWaysPHONEpsb_0" },
          { src: "images/300x600_atlas_1.png", id: "300x600_atlas_1" },
          { src: "images/300x600_atlas_2.png", id: "300x600_atlas_2" },
          { src: "images/300x600_atlas_3.png", id: "300x600_atlas_3" },
          { src: "images/300x600_atlas_4.png", id: "300x600_atlas_4" },
          { src: "images/300x600_atlas_5.png", id: "300x600_atlas_5" },
          { src: "images/300x600_atlas_6.png", id: "300x600_atlas_6" },
          { src: "images/300x600_atlas_7.png", id: "300x600_atlas_7" },
        ]);
      }
      function handleFileLoad(evt, comp) {
        var images = comp.getImages();
        if (evt && evt.item.type == "image") {
          images[evt.item.id] = evt.result;
        }
      }
      function handleComplete(evt, comp) {
        var lib = comp.getLibrary();
        var ss = comp.getSpriteSheet();
        var queue = evt.target;
        var ssMetadata = lib.ssMetadata;
        for (var i = 0; i < ssMetadata.length; i++) {
          ss[ssMetadata[i].name] = new createjs.SpriteSheet({
            images: [queue.getResult(ssMetadata[i].name)],
            frames: ssMetadata[i].frames,
          });
        }
        exportRoot = new lib.Banner300x600_v5();
        stage = new lib.Stage(canvas);
        stage.enableMouseOver();
        fnStartAnimation = function () {
          stage.addChild(exportRoot);
          createjs.Ticker.framerate = lib.properties.fps;
          createjs.Ticker.addEventListener("tick", stage);
        };
        AdobeAn.makeResponsive(true, "both", false, 1, [
          canvas,
          anim_container,
          dom_overlay_container,
        ]);
        AdobeAn.compositionLoaded(lib.properties.id);
        var overlay = document.getElementById("loading_overlay");
        if (overlay) overlay.style.display = "none";
        fnStartAnimation();
      }
    </script>
